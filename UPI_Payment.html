<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column}
.top{padding:12px 16px;border-bottom:1px solid #e8e8e8}
.headrow{display:flex;justify-content:space-between;align-items:center;gap:10px}
.leftgrp{display:flex;align-items:center;gap:10px;min-width:0;flex:1 1 auto}
.upiLogo{width:92px;height:auto;object-fit:contain;flex:0 0 auto;display:block}
.payinfo{display:flex;flex-direction:column;min-width:0;justify-content:center;flex:1 1 auto}
.title{font-size:16px;color:#f57c00;font-weight:600;line-height:1;margin-bottom:4px;white-space:nowrap}
.amountrow{display:flex;align-items:baseline;gap:4px;font-size:28px;font-weight:700;color:#111;line-height:1;white-space:nowrap}
.details{background:#5965d8;color:#fff;border:none;border-radius:8px;padding:10px 12px;font-size:14px;font-weight:700;cursor:pointer;flex:0 0 auto;white-space:nowrap}
.midwrap{padding:18px 18px 0}
.orange{background:linear-gradient(135deg,#ff9a1f 0%,#ffbf35 100%);border-radius:10px;padding:18px 14px 14px;position:relative}
.brand{display:flex;justify-content:center;margin-bottom:10px}
.brand img{width:min(78vw,300px);height:auto;display:block;object-fit:contain}
.scan{font-size:36px;font-weight:900;color:#111;text-align:center;letter-spacing:1px;margin:8px 0 14px;line-height:1}
.qrbox{background:#fff;border-radius:10px;padding:18px;width:100%;max-width:520px;margin:0 auto;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.qrbox img{width:100%;display:block;border-radius:4px}
.tap{text-align:center;font-size:14px;font-weight:700;color:#d15d00;margin:10px 0 0}
.bhim{padding:14px 0 10px;text-align:center}
.bhimline{display:flex;justify-content:center;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.bhimline img{height:34px;width:auto;display:block}
.apps{display:flex;justify-content:center;gap:16px;margin-top:6px;align-items:center;flex-wrap:wrap}
.apps img{height:30px;width:auto;display:block}
.cash{background:#ff8f1f;border-radius:6px;margin-top:10px;padding:14px 14px 10px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.cashleft{display:flex;align-items:center;gap:10px;min-width:0}
.crown{font-size:28px;flex:0 0 auto}.cashbadge{font-size:28px;line-height:1.0;font-weight:900;color:#171717;background:#ffd95a;padding:10px 16px;border-radius:18px;box-shadow:0 2px 0 rgba(0,0,0,.1) inset}
.cashright{font-size:18px;font-weight:700;color:#111;line-height:1.25;text-align:left;flex:1 1 220px}.small{font-size:12px;font-weight:400;margin-top:8px;text-align:center}
.foot{padding:16px 0 12px;text-align:center}.foot img{height:28px}
.confirmwrap{padding:16px 18px 24px;background:#fff}.btn{width:100%;padding:18px;border:none;border-radius:8px;background:#0f6f8c;color:#fff;font-size:20px;cursor:pointer}
@media (max-width:420px){
  .top{padding:10px 12px}
  .headrow{gap:8px}
  .upiLogo{width:72px}
  .title{font-size:14px}
  .amountrow{font-size:23px}
  .details{padding:9px 10px;font-size:13px}
  .brand img{width:min(84vw,260px)}
  .scan{font-size:30px;margin:6px 0 12px}
  .qrbox{padding:14px}
  .cashbadge{font-size:24px;padding:8px 12px}
  .cashright{font-size:16px}
}
</style>
</head>
<body>
<div class="top">
  <div class="headrow">
    <div class="leftgrp">
      <img src="images/B.png" alt="UPI" class="upiLogo">
      <div class="payinfo">
        <div class="title">UPI/Bharat QR</div>
        <div class="amountrow"><span>₹</span><span class="amt" id="upiAmt">0.00</span></div>
      </div>
    </div>
    <button class="details">DETAILS</button>
  </div>
</div>
<div class="midwrap">
  <div class="orange">
    <div class="brand"><img src="images/APay.png" alt="Amazon Pay"></div>
    <div class="scan">SCAN &amp; PAY</div>
    <div class="qrbox"><img id="qrImg" alt="UPI QR"></div>
    <div class="tap">TAP TO ENLARGE</div>
  </div>
  <div class="bhim">
    <div class="bhimline"><img src="images/BHIM_logo.svg" alt="BHIM"><img src="images/UPI_logo.svg" alt="UPI"></div>
    <div class="apps">
      <img src="images/amazon-pay-icon.svg" alt="amazon pay">
      <img src="images/google-pay-icon.svg" alt="google pay">
      <img src="images/phonepe-icon.svg" alt="phonepe">
      <img src="images/paytm-icon.svg" alt="paytm">
    </div>
  </div>
  <div class="cash">
    <div class="cashleft"><div class="crown">👑</div><div class="cashbadge">Cashback<br>Carnival</div></div>
    <div class="cashright">Up to ₹10 back*<br>Scan &amp; Pay using Amazon app<div class="small">Valid 10 times per user | T&amp;C apply</div></div>
  </div>
  <div class="foot"><img src="images/razorpay-icon.svg" alt="Razorpay"></div>
</div>
<div class="confirmwrap"><button class="btn" onclick="go()">Confirmed Payment</button></div>
<script>
const a=parseFloat(localStorage.getItem('payAmount'))||0;document.getElementById('upiAmt').textContent=a.toFixed(2);
const upiId='jayachandra77821@axl';const payeeName='LLP 2.0';const tn='Mobile Exchange Payment';const am=a.toFixed(2);
const upiString=`upi://pay?pa=${upiId}&pn=${encodeURIComponent(payeeName)}&am=${am}&cu=INR&tn=${encodeURIComponent(tn)}`;
document.getElementById('qrImg').src='https://api.qrserver.com/v1/create-qr-code/?size=360x360&data='+encodeURIComponent(upiString);
function go(){location.href='Final_Success.html';}
</script>
</body>
</html>
