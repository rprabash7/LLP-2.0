<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancel Exchange</title>
    <style>
        * { box-sizing:border-box; }
        body { margin:0; font-family:Arial, sans-serif; background:#fff; min-height:100vh; display:flex; flex-direction:column; }
        .header { background:#a9d8ee; display:flex; align-items:center; justify-content:space-between; padding:16px 18px; }
        .menu-icon { font-size:26px; color:#111; }
        .header-title { font-size:20px; font-weight:700; color:#111; letter-spacing:1px; }
        .right-icons { display:flex; gap:18px; }
        .right-icons span { font-size:22px; color:#111; }
        .content { padding:22px 20px; }
        h1 { font-size:28px; line-height:1.25; color:#222; margin:8px 0 22px; font-weight:700; }
        .msg { font-size:18px; color:#333; line-height:1.5; }
        .bottom { margin-top:auto; padding:18px 20px 28px; }
        .btn { width:100%; padding:18px; border:none; border-radius:6px; background:#0f6f8c; color:#fff; font-size:20px; }
    </style>
</head>
<body>
    <div class="header"><div class="menu-icon">&#9776;</div><div class="header-title">TRANSACTION</div><div class="right-icons">
    <img src="images/message.png" alt="Message" style="width:26px;height:26px;object-fit:contain">
    <img src="images/question.png" alt="Question" style="width:26px;height:26px;object-fit:contain">
</div></div>
    <div class="content">
        <h1>How does the customer want to pay?</h1>
        <div class="msg">Exchange has been cancelled. The customer will be redirected back to Home.</div>
    </div>
    <div class="bottom"><button class="btn" onclick="goHome()">Go Home</button></div>
    <script>function goHome(){ window.location.href='index.html'; }</script>
</body>
</html>
