<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Only</title>
    <style>
        * { box-sizing: border-box; }
        body { margin:0; font-family: Arial, sans-serif; background:#fff; min-height:100vh; display:flex; flex-direction:column; }
        .header { background:#a9d8ee; display:flex; align-items:center; justify-content:space-between; padding:16px 18px; }
        .menu-icon { font-size:26px; color:#111; }
        .header-title { font-size:20px; font-weight:700; color:#111; letter-spacing:1px; }
        .right-icons { display:flex; gap:18px; }
        .right-icons span { font-size:22px; color:#111; }
        .wrap { padding:22px 20px; }
        h1 { font-size:28px; margin:8px 0 22px; color:#222; font-weight:700; }
        .box { border-top:1px solid #ddd; border-bottom:1px solid #ddd; padding:22px 0; display:flex; justify-content:space-between; align-items:center; }
        .label { font-size:21px; color:#222; }
        .amount { font-size:30px; color:#a10d2b; font-weight:700; }
        .note { margin-top:18px; font-size:18px; color:#333; line-height:1.45; }
        .bottom { margin-top:auto; padding:18px 20px 28px; }
        .btn { width:100%; padding:18px; border:none; border-radius:6px; background:#0f6f8c; color:#fff; font-size:20px; }
    </style>
</head>
<body>
    <div class="header"><div class="menu-icon">&#9776;</div><div class="header-title">TRANSACTION</div><div class="right-icons">
    <img src="images/message.png" alt="Message" style="width:26px;height:26px;object-fit:contain">
    <img src="images/question.png" alt="Question" style="width:26px;height:26px;object-fit:contain">
</div></div>
    <div class="wrap">
        <h1>How does the customer want to pay?</h1>
        <div class="box"><div class="label">Total due</div><div class="amount" id="due">₹0.00</div></div>
        <div class="note">This is the amount customer pays without exchange.</div>
    </div>
    <div class="bottom"><button class="btn" onclick="go()">Continue</button></div>
    <script>
        const total = parseFloat(localStorage.getItem('deliveryPay')) || parseFloat(localStorage.getItem('originalPrice')) || parseFloat(localStorage.getItem('newPhonePrice')) || 0;
        document.getElementById('due').textContent = '₹' + total.toFixed(2);
        function go(){ window.location.href='Final_Success.html'; }
    </script>
</body>
</html>
