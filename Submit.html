<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange Result</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; padding: 20px; box-sizing: border-box; }
        h2 { font-size: 22px; margin-bottom: 20px; color: #222; }
        .result-box { background: white; border: 2px solid #28a745; border-radius: 10px; padding: 25px; width: 100%; max-width: 350px; text-align: center; margin-bottom: 25px; }
        .label { font-size: 15px; color: #555; margin-bottom: 5px; }
        .amount { font-size: 32px; font-weight: bold; color: #28a745; margin: 10px 0; }
        .deduct { font-size: 14px; color: #dc3545; margin-top: 5px; }
        .original { font-size: 14px; color: #888; }
        button { padding: 12px 30px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; }
        button:hover { background: #0056b3; }
        .tick { font-size: 50px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Exchange Inspection Complete</h2>
    <div class="result-box">
        <div class="tick">✅</div>
        <div class="label">Original Price</div>
        <div class="original" id="origPrice"></div>
        <div class="label" style="margin-top:12px;">Total Deduction</div>
        <div class="deduct" id="deductAmt"></div>
        <div class="label" style="margin-top:12px;">Final Exchange Value</div>
        <div class="amount" id="finalAmt"></div>
    </div>
    <button onclick="window.location.href='index.html'">Start New Inspection</button>
    <script>
        document.getElementById('origPrice').textContent = '₹' + (localStorage.getItem('originalPrice') || '0');
        document.getElementById('deductAmt').textContent = '- ₹' + (localStorage.getItem('deductAmount') || '0');
        document.getElementById('finalAmt').textContent = '₹' + (localStorage.getItem('finalPrice') || '0');
    </script>
</body>
</html>
