<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; background: #fff; min-height: 100vh; }
        .header { background: #a9d8ee; display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; }
        .menu-icon { font-size: 26px; color: #111; }
        .header-title { font-size: 20px; font-weight: 700; letter-spacing: 1px; color: #111; }
        .right-icons { display: flex; gap: 18px; }
        .right-icons span { font-size: 22px; color: #111; }
        .content { padding: 22px 20px 24px; }
        h1 { font-size: 26px; line-height: 1.25; color: #222; font-weight: 500; margin: 8px 0 26px; }
        .total-box { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; font-size: 20px; }
        .total-box .label { color: #222; }
        .total-box .amount { color: #a10d2b; font-size: 28px; font-weight: 700; }
        .choice { display: flex; align-items: center; gap: 18px; padding: 18px 0; border-bottom: 1px solid #ddd; }
        .radio { width: 38px; height: 38px; border: 2px solid #888; border-radius: 50%; flex: 0 0 auto; position: relative; background: #fff; }
        .radio.selected::after { content: ''; position: absolute; inset: 8px; background: #0f6f8c; border-radius: 50%; }
        .choice-text { font-size: 19px; color: #222; }
        .choice-text small { display: block; font-size: 17px; color: #333; margin-top: 8px; line-height: 1.35; }
        .bottom { padding: 18px 20px 28px; }
        .continue-btn { width: 100%; border: none; border-radius: 6px; background: #d9e6ef; color: #8f9baa; padding: 18px; font-size: 20px; }
        .continue-btn.active { background: #0f6f8c; color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <div class="menu-icon">&#9776;</div>
        <div class="header-title">TRANSACTION</div>
        <div class="right-icons"><span>&#128172;</span><span>?</span></div>
    </div>
    <div class="content">
        <h1>How does the customer want to pay?</h1>
        <div class="total-box">
            <div class="label">Total due</div>
            <div class="amount" id="totalDue">₹0.00</div>
        </div>
        <div class="choice" onclick="pick('cash')">
            <div class="radio" id="cashRadio"></div>
            <div class="choice-text">Cash</div>
        </div>
        <div class="choice" onclick="pick('upi')">
            <div class="radio" id="upiRadio"></div>
            <div class="choice-text">Paylink/UPI/Card</div>
        </div>
    </div>
    <div class="bottom">
        <button class="continue-btn" id="continueBtn" disabled>Continue</button>
    </div>
    <script>
        const choice = localStorage.getItem('proceedChoice') || '';
        const orig = parseFloat(localStorage.getItem('originalPrice')) || 0;
        const deduct = parseFloat(localStorage.getItem('deductionTotal')) || 0;
        const finalPrice = Math.max(orig - deduct, 0);
        const newPrice = parseFloat(localStorage.getItem('newPhonePrice')) || 0;
        const customerPay = Math.max(newPrice - finalPrice, 0);
        const withoutExchange = newPrice;
        const totalDue = choice === 'delivery' ? withoutExchange : customerPay;
        document.getElementById('totalDue').textContent = '₹' + totalDue.toFixed(2);
        function clearSel(){['cashRadio','upiRadio'].forEach(id => document.getElementById(id).classList.remove('selected'));}
        function pick(v){ clearSel(); if(v==='cash') document.getElementById('cashRadio').classList.add('selected'); if(v==='upi') document.getElementById('upiRadio').classList.add('selected'); const b=document.getElementById('continueBtn'); b.disabled=false; b.classList.add('active'); b.onclick = () => { if(choice==='cancel') return; if(choice==='exchange' || choice==='delivery'){ window.location.href='Final_Success.html'; } } }
    </script>
</body>
</html>
