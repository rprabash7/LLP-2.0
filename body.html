<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is Body Free Of Big Scratches?</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
        h2 { font-size: 22px; margin-bottom: 30px; color: #222; text-align: center; padding: 0 20px; }
        .step { font-size: 14px; color: #888; margin-bottom: 10px; }
        .pct { font-size: 13px; color: #007bff; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 20px; }
        button { padding: 12px 35px; font-size: 18px; cursor: pointer; border: none; border-radius: 6px; color: white; }
        .yes { background: #28a745; }
        .yes:hover { background: #1e7e34; }
        .no { background: #dc3545; }
        .no:hover { background: #b02a37; }
    </style>
</head>
<body>
    <div class="step">Step 14 of 17</div>
    <h2>Is Body Free Of Big Scratches?</h2>
    <div class="pct">Deduction if NO: 7%</div>
    <div class="btn-group">
        <button class="yes" onclick="answer('yes')">YES</button>
        <button class="no" onclick="answer('no')">NO</button>
    </div>
    <script>
        function answer(val) {
            if (val === 'no') {
                let price = parseFloat(localStorage.getItem('originalPrice')) || 0;
                let deduct = parseFloat(localStorage.getItem('deductionTotal')) || 0;
                deduct += price * (7 / 100);
                localStorage.setItem('deductionTotal', deduct);
            }
            window.location.href = 'Smalls1.html';
        }
    </script>
</body>
</html>
