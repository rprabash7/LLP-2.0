<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Panel In Good Condition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background: #a9d8ee;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
        }

        .menu-icon {
            font-size: 26px;
            color: #111;
            cursor: pointer;
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
            color: #111;
            letter-spacing: 1px;
        }

        .right-icons {
            display: flex;
            gap: 18px;
        }

        .right-icons span {
            font-size: 22px;
            color: #111;
            cursor: pointer;
        }

        .instruction-bar {
            background: #232a31;
            color: white;
            padding: 14px 18px;
            font-size: 15px;
        }

        .content {
            flex: 1;
            padding: 28px 22px;
        }

        .content h1 {
            font-size: 24px;
            font-weight: bold;
            color: #1d2733;
            margin-bottom: 18px;
            line-height: 1.3;
        }

        .content p {
            font-size: 16px;
            color: #2d3742;
            line-height: 1.7;
        }

        .bottom-section {
            padding: 14px 18px 28px;
            border-top: 1px solid #e5e5e5;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-yes {
            width: 100%;
            padding: 17px;
            font-size: 18px;
            background: #0f6f8c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-no {
            width: 100%;
            padding: 17px;
            font-size: 18px;
            background: #dce8f0;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="menu-icon">&#9776;</div>
        <div class="header-title">EXCHANGE</div>
        <div class="right-icons">
            <span>&#128172;</span>
            <span>?</span>
        </div>
    </div>
    <div class="instruction-bar">Inspect Old Mobile</div>
    <div class="content">
        <h1>[11] Phone panel in good condition?</h1>
        <p>Select “No” if body panel is missing, broken or there is gap/glue traces between body & back panel.</p>
    </div>
    <div class="bottom-section">
        <button class="btn-yes" onclick="answer('yes')">Yes</button>
        <button class="btn-no" onclick="answer('no')">No</button>
    </div>
    <script>
        function answer(val) {
            localStorage.setItem("ans_11", val);
            if (val === 'no') {
                let price = parseFloat(localStorage.getItem('originalPrice')) || 0;
                let deduct = parseFloat(localStorage.getItem('deductionTotal')) || 0;
                deduct += price * (6 / 100);
                localStorage.setItem('deductionTotal', deduct);
            }
            window.location.href = 'Camera_Glass.html';
        }
    </script>
</body>
</html>
